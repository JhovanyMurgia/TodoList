<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aplicação TODO List — Gerencie suas tarefas de forma eficiente e elegante.">
  <title>TODO List — Gerenciador de Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">✅</span>
        <h1>TODO List</h1>
      </div>
      <div class="header-actions">
        <div class="task-counter">
          <span id="task-count">0</span> tarefas
        </div>
        <button id="theme-toggle" class="btn-icon" title="Alternar tema" aria-label="Alternar tema claro/escuro">
          <span class="theme-icon-dark">🌙</span>
          <span class="theme-icon-light">☀️</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Add Task Section -->
    <section class="add-task-section" id="add-task-section">
      <div class="card glass">
        <h2 class="section-title">
          <span class="section-icon">➕</span>
          Nova Tarefa
        </h2>
        <form id="task-form" class="task-form">
          <div class="form-group">
            <label for="task-title">Título *</label>
            <input
              type="text"
              id="task-title"
              name="title"
              placeholder="O que você precisa fazer?"
              maxlength="100"
              required
              autocomplete="off"
            >
            <span class="char-count"><span id="title-count">0</span>/100</span>
          </div>
          <div class="form-group">
            <label for="task-description">Descrição</label>
            <textarea
              id="task-description"
              name="description"
              placeholder="Detalhes adicionais (opcional)"
              maxlength="500"
              rows="3"
            ></textarea>
            <span class="char-count"><span id="desc-count">0</span>/500</span>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary">
            Adicionar Tarefa
          </button>
        </form>
      </div>
    </section>

    <!-- Filter Section -->
    <section class="filter-section">
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all" id="filter-all">
          Todas
        </button>
        <button class="filter-btn" data-filter="pending" id="filter-pending">
          Pendentes
        </button>
        <button class="filter-btn" data-filter="completed" id="filter-completed">
          Concluídas
        </button>

      </div>
    </section>

    <!-- Task List Section -->
    <section class="task-list-section">
      <div id="task-list" class="task-list">
        <!-- Tasks rendered dynamically -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-icon">📋</div>
        <h3>Nenhuma tarefa encontrada</h3>
        <p>Comece adicionando sua primeira tarefa!</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>
      Desenvolvido com <span class="heart">❤️</span> usando
      <strong>SPEC-DRIVEN Development</strong> | Arquitetura <strong>MVC</strong>
    </p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
